<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <style>
    body{
      background-color: rgb(221, 212, 197);
    }
    .main {
      border: 2px double black;
      border-radius: 10px;
      padding: 5px;
      margin: 10px;
      width: 75%;
      margin-left: 150px;
      margin-right: 150px;
    }
    textarea{
      width: 100%;
      height: 80px;
      padding: 10px;
      border: 2px solid;
      border-radius: 5px;
    }
    button{
      margin-top:10px ;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>

  <body>
    <nav class="nav">
      <a class="nav-link active" aria-current="page" href="#">Dashboard</a>
      <a class="nav-link" href="#">Suppliers Registration</a>
      <a class="nav-link" href="#">Sales Registration</a>
      <a class="nav-link disabled" aria-disabled="true">Stockform</a>
    </nav>
    <form class="main">
      <h1 class="text-center">THE STOCK REGISRTATION FORM</h1>

      <div class="row my-3">
        <div class="col">
          <label for="formGroupExampleInput" class="form-label">Date</label>
          <input
            type="date"
            class="form-control"
            placeholder="First name"
            aria-label="First name"
          />
        </div>
        <div class="col">
          <label for="formGroupExampleInput" class="form-label"
            >Person in charge</label
          >
          <input type="text" class="form-control" />
        </div>
        <div class="row my-3">
          <div class="col">
            <label for="formGroupExampleInput" class="form-label"
              >Phone number</label
            >
            <input
              type="number"
              class="form-control"
              placeholder="phone number"
              aria-label="First name"
            />
          </div>
          <div class="col">
            <label for="formGroupExampleInput" class="form-label">Email</label>
            <input type="email" class="form-control" />
          </div>
        </div>
      </div>
      <h4 class="text-center">ITEMS</h4>
      <table class="table">
        <thead>
          <tr>
            <th scope="col">Item No</th>
            <th scope="col">Item name</th>
            <th scope="col">Unit Price</th>
            <th scope="col">Total Price</th>
          </tr>
        </thead>
        <tbody class="table-group-divider">
          <tr>
            <th scope="row">1</th>
            <td></td>
            <td></td>
            <td></td>
          </tr>
          <tr>
            <th scope="row">2</th>
            <td></td>
            <td></td>
            <td></td>
          </tr>
          <tr>
            <th scope="row">3</th>
            <td></td>
            <td></td>
            <td></td>
          </tr>
        </tbody>
      </table>
      <div class="comment box">
        <h5 class="text-center">COMMENT BOX</h5>
        <label>Your name </label><br />
        <input type="text" placeholder="Enter your name" /><br /><br>
        <label>Your comment</label>
        <textarea>write your comment here</textarea><br />
        <button>Submit</button>
      </div>
    </form>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
